apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap-cjob-config.yaml
  - configmap-postgres-schema.yaml
  - pvc-cli-binary.yaml
  - rbac-submit-api.yaml
  - rbac-dispatcher.yaml
  - networkpolicy-allow-submit-api.yaml
  - postgres/statefulset.yaml
  - submit-api/deployment.yaml
  - dispatcher/deployment.yaml
  - watcher/deployment.yaml

images:
  - name: yusekiya/cjob-submit-api
    newTag: "1.2.0"
  - name: yusekiya/cjob-dispatcher
    newTag: "1.2.0"
  - name: yusekiya/cjob-watcher
    newTag: "1.2.0"
