# このファイルは Secret の構造を示すテンプレートである。
# kustomization.yaml の resources には含めない。
# 管理者が初回セットアップ時に手動で作成すること:
#
#   kubectl create secret generic postgres-secret -n cjob-system \
#     --from-literal=POSTGRES_USER=cjob \
#     --from-literal=POSTGRES_PASSWORD='<password>' \
#     --from-literal=POSTGRES_DB=cjob
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cjob-system
type: Opaque
stringData:
  POSTGRES_USER: PLACEHOLDER
  POSTGRES_PASSWORD: PLACEHOLDER
  POSTGRES_DB: PLACEHOLDER
