apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatcher-sa
  namespace: cjob-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cjob-job-controller
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cjob-job-controller-binding
subjects:
  - kind: ServiceAccount
    name: dispatcher-sa
    namespace: cjob-system
roleRef:
  kind: ClusterRole
  name: cjob-job-controller
  apiGroup: rbac.authorization.k8s.io
