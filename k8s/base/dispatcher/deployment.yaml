apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: cjob-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dispatcher-sa
      containers:
        - name: dispatcher
          image: cjob-dispatcher
          ports:
            - containerPort: 9090
              name: metrics
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DISPATCH_BUDGET_PER_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCH_BUDGET_PER_NAMESPACE
            - name: DISPATCH_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCH_BATCH_SIZE
            - name: DISPATCH_ROUND_SIZE
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCH_ROUND_SIZE
            - name: DISPATCH_BUDGET_CHECK_INTERVAL_SEC
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCH_BUDGET_CHECK_INTERVAL_SEC
            - name: DISPATCH_RETRY_INTERVAL_SEC
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCH_RETRY_INTERVAL_SEC
            - name: DISPATCH_MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCH_MAX_RETRIES
            - name: GAP_FILLING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: GAP_FILLING_ENABLED
            - name: GAP_FILLING_STALL_THRESHOLD_SEC
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: GAP_FILLING_STALL_THRESHOLD_SEC
            - name: FAIR_SHARE_WINDOW_DAYS
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: FAIR_SHARE_WINDOW_DAYS
            - name: RESOURCE_FLAVORS
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: RESOURCE_FLAVORS
            - name: DEFAULT_FLAVOR
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DEFAULT_FLAVOR
            - name: KUEUE_LOCAL_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: KUEUE_LOCAL_QUEUE_NAME
            - name: WORKSPACE_MOUNT_PATH
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: WORKSPACE_MOUNT_PATH
            - name: LOG_BASE_DIR
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: LOG_BASE_DIR
            - name: TTL_SECONDS_AFTER_FINISHED
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: TTL_SECONDS_AFTER_FINISHED
            - name: CPU_LIMIT_BUFFER_MULTIPLIER
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: CPU_LIMIT_BUFFER_MULTIPLIER
            - name: JOB_NODE_TAINT
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: JOB_NODE_TAINT
            - name: DISPATCHER_METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cjob-config
                  key: DISPATCHER_METRICS_PORT
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["sh", "-c", "test $(( $(date +%s) - $(stat -c %Y /tmp/liveness) )) -lt 120"]
            initialDelaySeconds: 30
            periodSeconds: 30
