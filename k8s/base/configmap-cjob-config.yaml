# ConfigMap cjob-config のデフォルト値。
# 環境固有の値は overlay の patches で上書きする（k8s/overlay-example/ を参照）。
apiVersion: v1
kind: ConfigMap
metadata:
  name: cjob-config
  namespace: cjob-system
data:
  POSTGRES_HOST: postgres.cjob-system.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: cjob
  DISPATCH_BUDGET_PER_NAMESPACE: "32"
  DISPATCH_BATCH_SIZE: "50"
  DISPATCH_FETCH_MULTIPLIER: "10"
  DISPATCH_ROUND_SIZE: "1"
  DISPATCH_BUDGET_CHECK_INTERVAL_SEC: "10"
  DISPATCH_RETRY_INTERVAL_SEC: "30"
  DISPATCH_MAX_RETRIES: "5"
  GAP_FILLING_ENABLED: "true"
  GAP_FILLING_STALL_THRESHOLD_SEC: "300"
  FAIR_SHARE_WINDOW_DAYS: "7"
  RESOURCE_FLAVORS: |
    [
      {"name": "cpu", "label_selector": "cjob.io/flavor=cpu"},
      {"name": "gpu", "label_selector": "cjob.io/flavor=gpu", "gpu_resource_name": "nvidia.com/gpu"}
    ]
  DEFAULT_FLAVOR: cpu
  NODE_RESOURCE_SYNC_INTERVAL_SEC: "300"
  MAX_QUEUED_JOBS_PER_NAMESPACE: "500"
  MAX_SWEEP_COMPLETIONS: "1000"
  DEFAULT_TIME_LIMIT_SECONDS: "86400"
  MAX_TIME_LIMIT_SECONDS: "604800"
  CLUSTER_QUEUE_NAME: cjob-cluster-queue
  KUEUE_LOCAL_QUEUE_NAME: default
  RESOURCE_QUOTA_NAME: computing-quota
  RESOURCE_QUOTA_SYNC_INTERVAL_SEC: "10"
  USER_NAMESPACE_LABEL: cjob.io/user-namespace=true
  WORKSPACE_MOUNT_PATH: /home/jovyan
  LOG_BASE_DIR: /home/jovyan/.cjob/logs
  TTL_SECONDS_AFTER_FINISHED: "300"
  CPU_LIMIT_BUFFER_MULTIPLIER: "1.0"
  WATCHER_METRICS_PORT: "9090"
  PROMETHEUS_NAMESPACE_LABEL: kubernetes.io/metadata.name=monitoring
  JOB_NODE_TAINT: "role=computing:NoSchedule"
